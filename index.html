<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironwood Infrastructure Inc.</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Smooth scrolling for the whole page */
        html { scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-zinc-50 font-sans text-zinc-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CUSTOM SVG ICONS (Replaces Lucide to work in single-file HTML) ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );
        const Menu = (p) => <Icon {...p} path={<><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></>} />
        const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>} />
        const ChevronRight = (p) => <Icon {...p} path={<polyline points="9 18 15 12 9 6"></polyline>} />
        const ArrowRight = (p) => <Icon {...p} path={<><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></>} />
        const Train = (p) => <Icon {...p} path={<><rect x="4" y="3" width="16" height="16" rx="2" ry="2"></rect><path d="M4 11h16"></path><path d="M12 3v8"></path><path d="M8 19l-2 3"></path><path d="M16 19l2 3"></path><path d="M8 15h.01"></path><path d="M16 15h.01"></path></>} />
        const ShieldCheck = (p) => <Icon {...p} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></>} />
        const HardHat = (p) => <Icon {...p} path={<><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v2z"></path><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"></path><path d="M4 15v-3a8 8 0 0 1 16 0v3"></path></>} />
        const BookOpen = (p) => <Icon {...p} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></>} />
        const Youtube = (p) => <Icon {...p} path={<><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></>} />
        const Mail = (p) => <Icon {...p} path={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></>} />
        const Phone = (p) => <Icon {...p} path={<><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></>} />
        const MapPin = (p) => <Icon {...p} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></>} />
        const AlertTriangle = (p) => <Icon {...p} path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></>} />
        const FileCheck = (p) => <Icon {...p} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="9 15 11 17 15 13"></polyline></>} />
        const Users = (p) => <Icon {...p} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></>} />
        const TrendingUp = (p) => <Icon {...p} path={<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></>} />
        // ---------------------------------------------------------------------

        const Logo = () => (
          <div className="flex items-center">
            <img 
              src="image_c71aa0.png" 
              alt="Ironwood Infrastructure Logo" 
              className="h-16 md:h-20 w-auto object-contain mix-blend-multiply md:pr-4" 
              onError={(e) => {
                e.target.style.display = 'none';
                if (e.target.nextSibling) e.target.nextSibling.style.display = 'block';
              }}
            />
            <span className="hidden font-extrabold text-2xl tracking-tighter text-zinc-900">
              IRONWOOD <span className="text-red-600 font-medium text-lg">INFRASTRUCTURE</span>
            </span>
          </div>
        );

        function App() {
          const [currentPage, setCurrentPage] = useState('home');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [activeArticle, setActiveArticle] = useState(null);
          const [serviceTab, setServiceTab] = useState('grade-crossings');

          const navigate = (page) => {
            setCurrentPage(page);
            setActiveArticle(null);
            setIsMobileMenuOpen(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const navLinks = [
            { id: 'home', label: 'Home' },
            { id: 'about', label: 'About Us' },
            { id: 'services', label: 'Services' },
            { id: 'insights', label: 'Insights' },
            { id: 'media', label: 'Media' },
            { id: 'contact', label: 'Contact' },
          ];

          const renderContent = () => {
            switch (currentPage) {
              case 'home': return <Home navigate={navigate} setServiceTab={setServiceTab} />;
              case 'about': return <About />;
              case 'services': return <Services activeTab={serviceTab} setTab={setServiceTab} />;
              case 'insights': return <Insights activeArticle={activeArticle} setActiveArticle={setActiveArticle} />;
              case 'media': return <Media />;
              case 'contact': return <Contact />;
              default: return <Home navigate={navigate} setServiceTab={setServiceTab} />;
            }
          };

          return (
            <div className="min-h-screen flex flex-col">
              {/* Navigation */}
              <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm border-b border-zinc-100">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-24 py-2 gap-8">
                    <div className="flex-shrink-0 cursor-pointer" onClick={() => navigate('home')}>
                      <Logo />
                    </div>
                    
                    {/* Desktop Menu */}
                    <div className="hidden md:flex space-x-8 items-center ml-auto">
                      {navLinks.map((link) => (
                        <button
                          key={link.id}
                          onClick={() => navigate(link.id)}
                          className={`text-sm font-semibold transition-colors duration-200 ${
                            currentPage === link.id ? 'text-red-600' : 'text-zinc-600 hover:text-red-500'
                          }`}
                        >
                          {link.label}
                        </button>
                      ))}
                      <button 
                        onClick={() => navigate('contact')}
                        className="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-full font-semibold transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5"
                      >
                        Get in Touch
                      </button>
                    </div>

                    {/* Mobile Menu Button */}
                    <div className="md:hidden flex items-center">
                      <button
                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        className="text-zinc-600 hover:text-red-600 focus:outline-none"
                      >
                        {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                      </button>
                    </div>
                  </div>
                </div>

                {/* Mobile Menu Panel */}
                {isMobileMenuOpen && (
                  <div className="md:hidden bg-white border-t border-zinc-100 absolute w-full shadow-lg">
                    <div className="px-4 pt-2 pb-6 space-y-2">
                      {navLinks.map((link) => (
                        <button
                          key={link.id}
                          onClick={() => navigate(link.id)}
                          className={`block w-full text-left px-3 py-3 rounded-md text-base font-medium ${
                            currentPage === link.id ? 'bg-red-50 text-red-600' : 'text-zinc-700 hover:bg-zinc-50'
                          }`}
                        >
                          {link.label}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </nav>

              {/* Main Content Area */}
              <main className="flex-grow">
                {renderContent()}
              </main>

              {/* Footer */}
              <footer className="bg-black text-zinc-300 py-12 border-t border-zinc-900">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8">
                  <div className="col-span-1 md:col-span-2">
                    <div className="mb-6 bg-white inline-block p-4 rounded-xl">
                       <img 
                         src="image_c71aa0.png" 
                         alt="Ironwood Infrastructure Logo" 
                         className="h-12 w-auto object-contain"
                         onError={(e) => {
                           e.target.style.display = 'none';
                           if (e.target.nextSibling) e.target.nextSibling.style.display = 'block';
                         }}
                       />
                       <span className="hidden font-extrabold text-xl tracking-tighter text-zinc-900">
                         IRONWOOD <span className="text-red-600 font-medium text-sm">INFRASTRUCTURE</span>
                       </span>
                    </div>
                    <p className="text-zinc-400 max-w-sm mb-6 leading-relaxed">
                      Engineering Railway Solutions. Delivering safe, compliant, and client-focused project solutions across Canada.
                    </p>
                    <div className="flex space-x-4">
                      <a href="https://www.youtube.com/@IronwoodInfrastructure" target="_blank" rel="noreferrer" className="text-zinc-400 hover:text-red-600 transition-colors">
                        <Youtube size={24} />
                      </a>
                    </div>
                  </div>
                  <div>
                    <h4 className="text-white font-semibold mb-4 tracking-wider uppercase text-sm">Quick Links</h4>
                    <ul className="space-y-2">
                      {['Home', 'About', 'Services', 'Insights', 'Contact'].map((item) => (
                        <li key={item}>
                          <button onClick={() => navigate(item.toLowerCase())} className="hover:text-red-500 transition-colors">
                            {item}
                          </button>
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div>
                    <h4 className="text-white font-semibold mb-4 tracking-wider uppercase text-sm">Services</h4>
                    <ul className="space-y-2">
                      <li><button onClick={() => { navigate('services'); setServiceTab('grade-crossings'); }} className="hover:text-red-500 transition-colors">Grade Crossings</button></li>
                      <li><button onClick={() => { navigate('services'); setServiceTab('project-support'); }} className="hover:text-red-500 transition-colors">Project Support</button></li>
                      <li><button onClick={() => { navigate('services'); setServiceTab('training'); }} className="hover:text-red-500 transition-colors">Training</button></li>
                    </ul>
                  </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 pt-8 border-t border-zinc-800 text-center text-sm text-zinc-500">
                  Copyright © 2026 Ironwood Infrastructure Inc. - All Rights Reserved.
                </div>
              </footer>
            </div>
          );
        }

        /* ================= PAGE COMPONENTS ================= */

        function Home({ navigate, setServiceTab }) {
          const navigateToService = (tab) => {
            setServiceTab(tab);
            navigate('services');
          };

          return (
            <div className="fade-in">
              {/* Hero Section with Red/Black Gradient */}
              <section className="relative overflow-hidden bg-gradient-to-br from-black via-zinc-900 to-red-950 text-white py-32 lg:py-48">
                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                <div className="absolute top-0 left-0 right-0 h-full bg-gradient-to-b from-transparent to-black/50 pointer-events-none"></div>
                
                <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 z-10 text-center lg:text-left flex flex-col lg:flex-row items-center gap-12">
                  <div className="lg:w-2/3">
                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 mb-6">
                      <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                      <span className="text-sm font-medium tracking-wide uppercase">Engineering Railway Solutions</span>
                    </div>
                    <h1 className="text-5xl lg:text-7xl font-extrabold tracking-tight mb-6 leading-tight">
                      Unlock the <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-white">Potential of Engineering</span>
                    </h1>
                    <p className="text-xl text-zinc-300 mb-10 max-w-3xl leading-relaxed">
                      At Ironwood Infrastructure Inc., we specialize in multi-stakeholder railway infrastructure, safety, risk and project management solutions. Our expertise spans railway engineering, regulatory compliance, grade crossings, bridges, and complex joint infrastructure projects regulated by the CTA.
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                      <button onClick={() => navigate('about')} className="px-8 py-4 bg-red-600 hover:bg-red-700 text-white rounded-full font-bold text-lg transition-all shadow-lg hover:shadow-red-600/50 flex items-center justify-center gap-2 group">
                        Explore Our Vision <ArrowRight className="group-hover:translate-x-1 transition-transform" size={20} />
                      </button>
                      <button onClick={() => navigate('contact')} className="px-8 py-4 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 text-white rounded-full font-bold text-lg transition-all flex items-center justify-center">
                        Contact Our Team
                      </button>
                    </div>
                  </div>
                </div>
              </section>

              {/* Quick Links / Services Cards */}
              <section className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="text-center mb-16">
                    <h2 className="text-3xl md:text-4xl font-bold text-zinc-900 mb-4">Our Core Solutions</h2>
                    <p className="text-lg text-zinc-600 max-w-2xl mx-auto">Committed to delivering high-quality, customized solutions that will meet and exceed your expectations.</p>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    {/* Card 1 */}
                    <div className="bg-zinc-50 rounded-2xl p-8 border border-zinc-100 shadow-sm hover:shadow-xl hover:border-red-100 transition-all duration-300 group flex flex-col h-full">
                      <div className="w-16 h-16 bg-red-100 text-red-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-red-600 group-hover:text-white transition-colors">
                        <Train size={32} />
                      </div>
                      <h3 className="text-2xl font-bold text-zinc-900 mb-3 group-hover:text-red-600 transition-colors">Grade Crossings</h3>
                      <p className="text-zinc-600 mb-6 flex-grow">Simple Solutions for Safer Crossings. Expert assessments, compliance evaluation, and whistle cessation consultation.</p>
                      <button onClick={() => navigateToService('grade-crossings')} className="flex items-center text-red-600 font-semibold group-hover:text-red-700">
                        Learn more <ChevronRight size={20} className="ml-1 group-hover:translate-x-1 transition-transform" />
                      </button>
                    </div>

                    {/* Card 2 */}
                    <div className="bg-zinc-50 rounded-2xl p-8 border border-zinc-100 shadow-sm hover:shadow-xl hover:border-zinc-300 transition-all duration-300 group flex flex-col h-full">
                      <div className="w-16 h-16 bg-zinc-200 text-zinc-800 rounded-xl flex items-center justify-center mb-6 group-hover:bg-zinc-800 group-hover:text-white transition-colors">
                        <HardHat size={32} />
                      </div>
                      <h3 className="text-2xl font-bold text-zinc-900 mb-3">Project Support</h3>
                      <p className="text-zinc-600 mb-6 flex-grow">Bridging the Gap in Railway Solutions. Comprehensive project management, constructability reviews, and risk assessments.</p>
                      <button onClick={() => navigateToService('project-support')} className="flex items-center text-zinc-800 font-semibold group-hover:text-black">
                        Learn more <ChevronRight size={20} className="ml-1 group-hover:translate-x-1 transition-transform" />
                      </button>
                    </div>

                    {/* Card 3 */}
                    <div className="bg-zinc-50 rounded-2xl p-8 border border-zinc-100 shadow-sm hover:shadow-xl hover:border-red-100 transition-all duration-300 group flex flex-col h-full">
                      <div className="w-16 h-16 bg-red-50 text-red-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-red-600 group-hover:text-white transition-colors">
                        <BookOpen size={32} />
                      </div>
                      <h3 className="text-2xl font-bold text-zinc-900 mb-3 group-hover:text-red-600 transition-colors">Training</h3>
                      <p className="text-zinc-600 mb-6 flex-grow">Smart Solutions Start with Knowledge. Expert-led training programs on railway safety, compliance, and regulations.</p>
                      <button onClick={() => navigateToService('training')} className="flex items-center text-red-600 font-semibold group-hover:text-red-700">
                        Learn more <ChevronRight size={20} className="ml-1 group-hover:translate-x-1 transition-transform" />
                      </button>
                    </div>
                  </div>
                </div>
              </section>
            </div>
          );
        }

        function About() {
          return (
            <div className="fade-in pb-20">
              {/* Header */}
              <div className="bg-black py-20 text-center relative overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-r from-zinc-900 to-red-950/50"></div>
                <h1 className="text-4xl md:text-5xl font-bold text-white relative z-10">Who We Are</h1>
                <p className="text-xl text-zinc-300 mt-4 max-w-3xl mx-auto relative z-10 px-4">
                  We provide complex railway projects with safe, compliant, and forward-thinking solutions.
                </p>
              </div>

              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-16">
                {/* Vision & Mandate */}
                <div className="grid md:grid-cols-2 gap-8 mb-20">
                  <div className="bg-white p-10 rounded-2xl shadow-lg border-t-4 border-zinc-800">
                    <h3 className="text-2xl font-bold text-zinc-900 mb-4 flex items-center gap-3">
                      <TrendingUp className="text-zinc-800" /> Our Vision
                    </h3>
                    <p className="text-zinc-600 text-lg leading-relaxed">
                      To shape the future of railway transportation through accountability, safety, and knowledge.
                    </p>
                  </div>
                  <div className="bg-white p-10 rounded-2xl shadow-lg border-t-4 border-red-600">
                    <h3 className="text-2xl font-bold text-zinc-900 mb-4 flex items-center gap-3">
                      <ShieldCheck className="text-red-600" /> Our Mandate
                    </h3>
                    <p className="text-zinc-600 text-lg leading-relaxed">
                      To set the standard for excellence by delivering safe, compliant, and client-focused project solutions.
                    </p>
                  </div>
                </div>

                {/* Bridging the Gap */}
                <div className="bg-zinc-50 rounded-3xl p-8 md:p-12 mb-20 border border-zinc-200">
                  <h2 className="text-3xl font-bold text-zinc-900 mb-6">Bridging the Gap: Ironwood Infrastructure</h2>
                  <div className="space-y-6 text-lg text-zinc-700 leading-relaxed">
                    <p>
                      Ironwood Infrastructure was founded in 2022 to bridge a critical gap in the railway industry—delivering safety, compliance, and accountability while fostering stronger collaboration among stakeholders. As railway infrastructure projects grow in scale and complexity, the need for a solutions-driven partner has never been greater. We bring together railways, road authorities, industry leaders, and regulators to create safer, more efficient, and forward-thinking railway networks.
                    </p>
                    <p>
                      With unmatched expertise in regulated railway infrastructure, we have positioned ourselves as a trusted engineering firm committed to excellence. Our deep industry knowledge and proactive approach sets us apart, ensuring that every project meets the highest standards of safety, compliance, and accountability. At Ironwood Infrastructure, we’re not just delivering railway projects—we’re shaping the future of transportation, strengthening connections between communities, and redefining what’s possible.
                    </p>
                  </div>
                </div>

                {/* Team Profile */}
                <div className="bg-white rounded-3xl shadow-xl overflow-hidden max-w-5xl mx-auto border border-zinc-100">
                  <div className="grid md:grid-cols-5 h-full">
                    <div className="md:col-span-2 bg-zinc-200">
                      <img 
                        src="rs=w_730,h_730,cg_true.webp" 
                        alt="Jennifer Benedict" 
                        className="w-full h-[400px] md:h-full object-cover object-top"
                      />
                    </div>
                    <div className="md:col-span-3 p-8 md:p-12 flex flex-col justify-center bg-zinc-900 text-white">
                      <h2 className="text-3xl font-bold mb-2">Jennifer Benedict, M.Eng., P.Eng.</h2>
                      <h3 className="text-red-500 text-xl font-medium mb-6 uppercase tracking-wider">Principal</h3>
                      <p className="text-zinc-300 text-lg leading-relaxed mb-6">
                        Jennifer Benedict is a professional engineer with 15+ years of experience. She has an extensive background in risk and project management, inspection and regulatory compliance. Her experience includes delivering over 120 bridge and grade crossing projects, in addition to the implementation of Transport Canada's Grade Crossing Regulations.
                      </p>
                      <div className="mt-auto">
                        <p className="text-white font-medium italic border-l-4 border-red-600 pl-4 py-2">
                          "From safer crossings to efficient project delivery, our team is dedicated to bridging gaps and creating smarter, more reliable rail networks."
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function Services({ activeTab, setTab }) {
          const tabs = [
            { id: 'grade-crossings', label: 'Grade Crossings', icon: <Train size={20} /> },
            { id: 'project-support', label: 'Project Support', icon: <HardHat size={20} /> },
            { id: 'training', label: 'Training & Education', icon: <BookOpen size={20} /> },
          ];

          return (
            <div className="fade-in pb-20">
              {/* Header */}
              <div className="bg-black py-20 text-center relative overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-r from-zinc-900 to-red-950/50"></div>
                <h1 className="text-4xl md:text-5xl font-bold text-white relative z-10">Our Services</h1>

                  <div className="p-8 md:p-12">
                    <h3 className="text-2xl font-bold text-zinc-900 mb-6">Send us a Message</h3>
                    <form onSubmit={handleSubmit} className="space-y-6">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                          <label className="block text-sm font-medium text-zinc-700 mb-2">First Name</label>
                          <input required type="text" className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all" placeholder="John" />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-zinc-700 mb-2">Last Name</label>
                          <input required type="text" className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all" placeholder="Doe" />
                        </div>
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-zinc-700 mb-2">Email Address</label>
                        <input required type="email" className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all" placeholder="john@example.com" />
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-zinc-700 mb-2">Subject / Inquiry Type</label>
                        <select className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all bg-white">
                          <option>Grade Crossing Assessment</option>
                          <option>Project Management</option>
                          <option>Training & Education</option>
                          <option>General Inquiry</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-zinc-700 mb-2">Message</label>
                        <textarea required rows="4" className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all resize-none" placeholder="How can we help you?"></textarea>
                      </div>

                      <button type="submit" className="w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg">
                        Send Message
                      </button>
                    </form>
                  </div>

                </div>
              </div>
            </div>
          );
        }

        // Render the React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
